system:
  name: "Constitutional Orchestrator"
  version: "3.0.0"

# ---------------------------------------------------------------------------
# Model selector
# ---------------------------------------------------------------------------
# Change the model name here to switch ALL agents at once.
# Any model available in your local Ollama installation is valid.
#
# Popular options (install with: ollama pull <name>):
#   qwen2.5:7b          — fast, great code generation (default)
#   qwen2.5:14b         — slower, more accurate for complex tasks
#   deepseek-coder:6.7b — specialised for code tasks
#   deepseek-coder:33b  — best code quality, needs ~20 GB RAM
#   llama3:8b           — general purpose, good instruction following
#   llama3:70b          — very high quality, needs ~40 GB RAM
#   mistral:7b          — fast, good for structured output
#   phi3:mini           — tiny (3.8B), good on low-RAM machines
#   phi3:medium         — balanced quality/speed
#   codellama:7b        — Meta's code-focused model
#   codellama:13b       — larger code model
#
# You can also set per-agent overrides in the weaver / constitution sections
# below — the override takes precedence over the global default.
#
# To switch to a different model at runtime:
#   python run_orchestrator.py my_config.yaml
# where my_config.yaml has a different model_default value.

model_default: "qwen3.5:9b-mlx"

# ---------------------------------------------------------------------------
# Weaver (planning agent)
# ---------------------------------------------------------------------------
weaver:
  model: "qwen3.5:9b-mlx"   # override model_default for this agent (optional)
  temperature: 0.2
  max_tokens: 4096
  # CRITICAL: Constitution Node must evaluate BOTH code and intent for harmful content
  system_prompt: |
    You are the Weaver, a specialized planning agent. Your role is strictly to analyze tasks and produce step-by-step execution plans with drafted code.

    RULES:
    1. You do NOT execute code. You only plan and draft.
    2. Every plan must include explicit file paths, dependencies, and expected outputs.
    3. Code drafts should be complete, commented, and ready for review.
    4. If a task requires external API calls, mark it with [API_REQUIRED].
    5. If a task modifies existing files, mark it with [FILESYSTEM_MODIFY].
    6. If a task requires root privileges, mark it with [ROOT_REQUIRED].
    7. Always prefer safe, local operations over network calls.
    8. Prefer Python for automation scripts.
    9. CRITICAL: Each code block must be self-contained. Do not write Python code that expects other steps to create files. If multiple steps are needed, Python code should execute immediately (not define functions for later bash calls).
    10. NEW ABILITY: You have access to the user's local codebase mounted at `/codebase`. If asked to read, analyze, or refactor existing code, use `/codebase` as your target directory. If writing to or modifying `/codebase`, you MUST include the [FILESYSTEM_MODIFY] tag.
    11. For file refactors, generate exactly one Python code block that runs end-to-end. Do NOT emit separate install/analyze/refactor blocks.
    12. Do NOT use placeholder paths like /path/to/...; always use explicit paths provided by the user.
    13. Prefer stdlib-only refactors. Do NOT pip install formatters at runtime. If optional tools are unavailable, fall back to safe text/AST edits and keep behavior unchanged.
    14. Before writing, validate file existence and print a clear message if missing. Never reference undefined variables.
    15. Every Python script must include all required imports at the top (`import os`, `from pathlib import Path`, etc.) and must run as-is with no undefined names.
    16. Do NOT use or import `autopep8`, `black`, or other external formatters unless the user explicitly asks for them.
    17. Only include `[API_REQUIRED]` when the code performs an actual network request.
    18. Avoid multiline f-strings in generated Python. Build output text using intermediate variables and `"\n".join(...)`, then write the final string variable to file.

# ---------------------------------------------------------------------------
# Constitution (safety evaluator)
# ---------------------------------------------------------------------------
constitution:
  model: "qwen3.5:4b"   # can differ from weaver (e.g. a faster model for safety checks)
  temperature: 0.0
  max_tokens: 512

  rules:
    - id: "C001"
      name: "Network Restriction"
      description: "Code must not make unauthorized network requests"
      patterns:
        - "requests\\.get"
        - "requests\\.post"
        - "urllib\\.request"
        - "socket\\."
        - "http\\.client"
        - "ftp\\."
        - "telnetlib"
      severity: "critical"
      exception_tag: "[API_REQUIRED]"

    - id: "C002"
      name: "File System Safety"
      description: "Code must not modify root or system-critical files"
      patterns:
        - "open\\(['\"/]etc/"
        - "open\\(['\"/]usr/"
        - "open\\(['\"/]bin/"
        - "open\\(['\"/]sbin/"
        - "open\\(['\"/]System/"
        - "os\\.system\\("
        - "subprocess\\.call\\("
        - "subprocess\\.run\\("
        - "subprocess\\.Popen\\("
      severity: "critical"
      exception_tag: "[FILESYSTEM_MODIFY]"

    - id: "C003"
      name: "Infinite Loop Prevention"
      description: "Code must not contain unbounded loops"
      patterns:
        - "while True:"
        - "while 1:"
        - "for.*in itertools\\.count"
        - "while.*:.*pass"
      severity: "high"
      exception_tag: "[LOOP_REQUIRED]"

    - id: "C004"
      name: "Privilege Escalation"
      description: "Code must not attempt to gain root privileges"
      patterns:
        - "sudo "
        - "os\\.setuid"
        - "os\\.setgid"
        - "os\\.seteuid"
        - "chmod.*777"
        - "chmod.*4755"
      severity: "critical"
      exception_tag: "[ROOT_REQUIRED]"

    - id: "C005"
      name: "Data Exfiltration"
      description: "Code must not attempt to read and transmit sensitive data"
      patterns:
        - "open\\(.*\\.ssh"
        - "open\\(.*\\.env"
        - "open\\(.*id_rsa"
        - "open\\(.*password"
        - "open\\(.*secret"
        - "keychain"
        - "Keychain"
      severity: "critical"

    - id: "C006"
      name: "Resource Exhaustion"
      description: "Code must not consume unbounded resources"
      patterns:
        - "fork\\(\\)"
        - "os\\.fork"
        - "multiprocessing\\.Process.*while"
        - "threading\\.Thread.*while"
      severity: "high"

    - id: "C007"
      name: "Harmful Intent Detection"
      description: "Requests for violent, illegal, or dangerous activities are not permitted"
      patterns:
        - "(?i)(how to (kill|murder|bomb|shoot|stab) (people|someone|a person|humans))"
        - "(?i)(make (a bomb|explosives|chemical weapon|poison gas))"
        - "(?i)(instructions (to|for) (harm|kill|hurt|murder) (people|someone))"
        - "(?i)(create.*malware|write.*virus|build.*ransomware)"
        - "(?i)(child.*abuse|\\bcp\\b|pedophil|sexual.*assault|rape)"
        - "(?i)(hack (someone|my neighbor|their|his|her) (account|computer|phone|wifi))"
        - "(?i)((how to|steps? to|guide to|ways? to) steal (passwords|credentials|data|money) from)"
      severity: "critical"
      exception_tag: null

    - id: "C008"
      name: "Hate Speech and Discrimination"
      description: "Requests promoting discrimination, hate speech, or harassment are not permitted"
      patterns:
        - "(?i)(racist|racial slur|n-word|hateful|discriminat|inferior|genocide)"
        - "(?i)(harass|bully|mock.*group|demean)"
      severity: "critical"
      exception_tag: null

    - id: "C009"
      name: "Harmful Step-by-Step Instructions"
      description: "Responses must not provide detailed step-by-step instructions for harmful activities"
      patterns:
        - "(?i)(step.{0,10}by.{0,10}step).{0,50}(hack|exploit|attack|poison|synthesize|manufacture)"
        - "(?i)(exact|specific|detailed).{0,30}(payload|command|synthesis route|recipe|instructions).{0,30}(hack|attack|poison|explosive|weapon)"
        - "(?i)(here.{0,20}how to).{0,50}(bypass|exploit|hack|poison|manufacture|synthesize)"
      severity: "high"
      exception_tag: null

    - id: "C010"
      name: "Lethal Dosage Information"
      description: "Responses must not provide specific lethal dosage information"
      patterns:
        - "(?i)(lethal|fatal).{0,20}dose.{0,20}(is|equals|of).{0,20}\\d"
        - "(?i)ld50.{0,30}(is|equals|of).{0,20}\\d"
        - "(?i)\\d+.{0,10}(mg|grams|micrograms).{0,20}(lethal|fatal|kills|death)"
      severity: "critical"
      exception_tag: null

    - id: "C011"
      name: "Exploit Code or Commands"
      description: "Responses must not include working exploit commands targeting real systems"
      patterns:
        - "(?i)(msfconsole|metasploit|meterpreter).{0,50}(exploit|payload|shell)"
        - "(?i)arpspoof.{0,30}(-i|-t).{0,30}(eth|wlan|target)"
        - "(?i)(nc|netcat).{0,20}-e.{0,20}(/bin/sh|/bin/bash|cmd)"
        - "(?i)sqlmap.{0,30}(--dump|--passwords|--dbs)"
      severity: "critical"
      exception_tag: null

    - id: "C012"
      name: "Weapon or Drug Synthesis"
      description: "Responses must not provide synthesis routes for weapons or controlled substances"
      patterns:
        - "(?i)(synthesize|synthesis|manufacture|produce).{0,50}(fentanyl|heroin|meth|cocaine|TATP|RDX|PETN)"
        - "(?i)(acetone.{0,30}peroxide|hydrogen peroxide.{0,30}acetone).{0,30}(mix|combine|react)"
        - "(?i)(precursor|reagent).{0,30}(drug|explosive|weapon).{0,30}(available|buy|obtain)"
      severity: "critical"
      exception_tag: null

      # Principal Priority Ordering
  # When principles conflict, higher priority wins
  # 1 = highest priority (always wins)
  principle_priority:
    safety:
      priority: 1
      rules: ["C001", "C002", "C004", "C005", "C007", "C008", "C009", "C010", "C011", "C012"]
      description: "Safety always wins over helpfulness"
    resource:
      priority: 2
      rules: ["C003", "C006"]
      description: "Resource protection"
    helpfulness:
      priority: 3
      rules: []
      description: "Helpfulness — yields to safety when conflict detected"

# ---------------------------------------------------------------------------
# Sandbox (Docker execution)
# ---------------------------------------------------------------------------
sandbox:
  image: "constitutional-sandbox"
  timeout_seconds: 30
  memory_limit: "512m"
  cpu_limit: "1.0"
  network_mode: "bridge"    # used when [API_REQUIRED] tag is present
  read_only_rootfs: true
  tmpfs_size: "64m"
  pids_limit: 256
  cap_drop:
    - "ALL"
  run_as_user: "worker"
  codebase_write_requires_tag: true
  allowed_directories:
    - "/workspace"
    - "/codebase"
    - "/tmp"
    - "/tenant_storage"
    - "/tenant_secrets"
  blocked_syscalls:
    - "CAP_NET_ADMIN"
    - "CAP_SYS_ADMIN"
    - "CAP_SYS_PTRACE"

# ---------------------------------------------------------------------------
# Navigator (human approval gateway)
# ---------------------------------------------------------------------------
navigator:
  auto_approve_safe: false
  categories_requiring_approval:
    - "[API_REQUIRED]"
    - "[FILESYSTEM_MODIFY]"
    - "[ROOT_REQUIRED]"
    - "[REGULATORY_REVIEW]"
  log_file: "orchestrator_decisions.log"

# ---------------------------------------------------------------------------
# Audit logging (JSONL event stream)
# ---------------------------------------------------------------------------
audit:
  enabled: true
  log_file: "audit_events.log"
  include_plan: false
  max_plan_chars: 2000
  max_output_chars: 2000
  hmac_key_env: "AUDIT_HMAC_KEY"
  hmac_key: ""
  redact_patterns:
    - "(?i)(api[_-]?key|token|password)\\s*[:=]\\s*[^\\s'\"]+"
    - "\\bAKIA[0-9A-Z]{16}\\b"
  redact_replacement: "[REDACTED]"
  sqlite:
    enabled: true
    path: "audit_events.sqlite3"

# ---------------------------------------------------------------------------
# Dashboard (FastAPI)
# ---------------------------------------------------------------------------
dashboard:
  auth_token: "CHANGE_ME"    # Required for dashboard access
  event_limit: 1000          # Max audit events to load per view
  page_size: 50
  event_page_size: 200

# ---------------------------------------------------------------------------
# Regulatory node (compliance-focused safety checks)
# ---------------------------------------------------------------------------
regulatory:
  enabled: true
  mode: "pattern"          # "pattern" only (default). LLM mode can be added later.
  require_human_review_on_match: true
  rules:
    - id: "R001"
      name: "PII Logging"
      description: "Flag potential PII disclosure in logs or outputs"
      patterns:
        - "\\b(ssn|social security|credit card|passport)\\b"
        - "\\b(email|phone number|dob|date of birth)\\b"
      severity: "high"
      exception_tag: "[AUDIT_APPROVED]"

    - id: "R002"
      name: "Hardcoded Secrets"
      description: "Detect potential secrets committed into code"
      patterns:
        - "\\b(api_key|secret|token|password)\\s*="
        - "\\bAKIA[0-9A-Z]{16}\\b"
      severity: "critical"
      exception_tag: "[AUDIT_APPROVED]"

    - id: "R003"
      name: "Data Export Risk"
      description: "Detect bulk data export intent"
      patterns:
        - "\\bexport\\b"
        - "\\bdump\\b"
        - "\\bexfiltrat"
      severity: "medium"
      exception_tag: "[AUDIT_APPROVED]"

# ---------------------------------------------------------------------------
# RAG / vector memory (optional — fully offline)
# ---------------------------------------------------------------------------
# Requires:  pip install sentence-transformers chromadb
# The model (all-MiniLM-L6-v2, ~80 MB) is downloaded once on first use
# and then runs entirely offline.
rag:
  enabled: true
  backend: "vector"              # "vector" (sentence-transformers + Chroma) or "keyword" (Neo4j only)
  chroma_path: ".chroma_store"   # on-disk path for the persistent vector store
  embedding_model: "all-MiniLM-L6-v2"
  top_k: 3                       # number of similar past tasks to inject into prompts

# ---------------------------------------------------------------------------
# Tenancy (multi-tenant isolation)
# ---------------------------------------------------------------------------
tenancy:
  enabled: true
  default_tenant: "default"
  base_dir: ".tenants"
  storage_dirname: "storage"
  secrets_dirname: "secrets"
  rag_dirname: "rag"
  audit_dirname: "audit"
  policy_filename: "policy.yaml"
  storage_mount: "/tenant_storage"
  secrets_mount: "/tenant_secrets"

# ---------------------------------------------------------------------------
# Connectors (Slack / Notion / GitHub)
# ---------------------------------------------------------------------------
connectors:
  enabled: true
  enforce_secret_permissions: true
  request_timeout_seconds: 15
  user_agent: "mythical-ai/enterprise"
  slack:
    base_url: "https://slack.com/api"
    token_file: "slack_token.txt"
    allowed_hosts:
      - "slack.com"
  notion:
    base_url: "https://api.notion.com/v1"
    token_file: "notion_token.txt"
    api_version: "2022-06-28"
    allowed_hosts:
      - "api.notion.com"
  github:
    base_url: "https://api.github.com"
    token_file: "github_token.txt"
    allowed_hosts:
      - "api.github.com"
